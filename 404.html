<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found</title>
  <link rel="icon" type="image/png" href="images/site-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Shadows+Into+Light+Two&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(135deg, #c9a96e 0%, #b8944f 50%, #c9a96e 100%);
      font-family: 'Caveat', cursive;
      color: #2c1810;
    }
    .card {
      background: #fff9b1;
      padding: 3rem 2.5rem;
      max-width: 420px;
      text-align: center;
      transform: rotate(-2deg);
      box-shadow:
        2px 2px 6px rgba(0,0,0,.15),
        inset 0 0 40px rgba(0,0,0,.03);
    }
    h1 {
      font-family: 'Shadows Into Light Two', cursive;
      font-size: 4rem;
      margin-bottom: .5rem;
    }
    p { font-size: 1.5rem; margin-bottom: 1rem; }
    a {
      color: #1a3a5c;
      font-size: 1.4rem;
      text-decoration: underline wavy #1a3a5c;
    }
    a:hover { color: #8b2500; text-decoration-color: #8b2500; }
  </style>
</head>
<body>
  <div class="card">
    <h1>404</h1>
    <p>Oops — this page got lost in the scrapbook!</p>
    <a href="/">Back to the front page</a>
  </div>
</body>
</html>
